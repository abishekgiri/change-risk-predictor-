apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "releasegate.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "releasegate.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
{{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
