##############################################################################
# ReleaseGate governance gate for GitLab CI
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   RELEASEGATE_URL       – your ReleaseGate instance
#   RELEASEGATE_TOKEN     – API token with policy:read scope
#   JIRA_ISSUE_KEY        – e.g. PROJ-42  (set per-project or per-pipeline)
#   JIRA_PROJECT_KEY      – e.g. PROJ
#   JIRA_TRANSITION_ID    – Jira workflow transition ID (default 31; find yours in Jira → Workflow editor)
#   RELEASEGATE_TENANT_ID – your tenant slug
#   DEPLOY_ENV            – e.g. PRODUCTION (optional, default below)
##############################################################################
stages:
  - governance
  - deploy

variables:
  DEPLOY_ENV: "PRODUCTION"
  JIRA_TRANSITION_ID: "31"   # Override in Settings → CI/CD → Variables for your Jira workflow

releasegate_governance:
  stage: governance
  image: curlimages/curl:8.7.1
  script:
    - |
      RESPONSE=$(curl -sS -X POST "${RELEASEGATE_URL}/integrations/jira/transition/check" \
        -H "Authorization: Bearer ${RELEASEGATE_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "{
          \"issue_key\": \"${JIRA_ISSUE_KEY}\",
          \"transition_id\": \"${JIRA_TRANSITION_ID:-31}\",
          \"source_status\": \"Ready for Release\",
          \"target_status\": \"Done\",
          \"actor_account_id\": \"gitlab-ci\",
          \"environment\": \"${DEPLOY_ENV}\",
          \"project_key\": \"${JIRA_PROJECT_KEY}\",
          \"issue_type\": \"Story\"
        }")
      echo "${RESPONSE}" | tee releasegate_response.json
    - |
      STATUS=$(jq -r '.status // empty' releasegate_response.json)
      if [ "$STATUS" = "BLOCKED" ] || [ "$STATUS" = "ERROR" ]; then
        echo "ReleaseGate denied deployment (status=${STATUS})"
        exit 1
      fi
      echo "Gate passed (status=${STATUS})"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

