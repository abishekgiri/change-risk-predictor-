##############################################################################
# ReleaseGate governance gate for GitHub Actions
#
# Required secrets (Settings → Secrets → Actions):
#   RELEASEGATE_URL    – your ReleaseGate instance, e.g. https://app.releasegate.io
#   RELEASEGATE_TOKEN  – API token with policy:write scope
#
# Required variables (Settings → Variables, or set in the calling workflow):
#   RELEASEGATE_TENANT_ID – your tenant slug
#   JIRA_ISSUE_KEY        – e.g. PROJ-42  (for Jira-driven flows)
#   JIRA_PROJECT_KEY      – e.g. PROJ
#   JIRA_TRANSITION_ID    – Jira workflow transition ID (default 31; find yours in Jira → Workflow editor)
#   DEPLOY_ENV            – e.g. PRODUCTION (defaults to PRODUCTION)
##############################################################################
name: ReleaseGate Governance Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ── Phase 7: declare a decision ID FIRST ─────────────────────────────────
  # Every deploy must obtain a ReleaseGate decision ID before proceeding.
  # Store it as an output and pass it to the deploy step.
  releasegate-declare:
    runs-on: ubuntu-latest
    outputs:
      rg_decision_id: ${{ steps.declare.outputs.rg_decision_id }}
      allowed: ${{ steps.declare.outputs.allowed }}
    steps:
      - uses: actions/checkout@v4

      - name: Declare governance decision
        id: declare
        env:
          RELEASEGATE_URL:      ${{ secrets.RELEASEGATE_URL }}
          RELEASEGATE_TOKEN:    ${{ secrets.RELEASEGATE_TOKEN }}
          RELEASEGATE_TENANT:   ${{ vars.RELEASEGATE_TENANT_ID || 'default' }}
          DEPLOY_ENV:           ${{ vars.DEPLOY_ENV || 'PRODUCTION' }}
        run: |
          RESPONSE=$(curl -sS -X POST "${RELEASEGATE_URL}/decisions/declare" \
            -H "Authorization: Bearer ${RELEASEGATE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tenant_id\": \"${RELEASEGATE_TENANT}\",
              \"repo\": \"${{ github.repository }}\",
              \"environment\": \"${DEPLOY_ENV}\",
              \"sha\": \"${{ github.sha }}\",
              \"pr_number\": ${{ github.event.pull_request.number || 0 }},
              \"actor_id\": \"${{ github.actor }}\"
            }")
          echo "${RESPONSE}" | tee releasegate_declare.json
          RG_ID=$(echo "${RESPONSE}" | jq -r '.rg_decision_id // empty')
          ALLOWED=$(echo "${RESPONSE}" | jq -r '.allowed // false')
          echo "rg_decision_id=${RG_ID}" >> "$GITHUB_OUTPUT"
          echo "allowed=${ALLOWED}" >> "$GITHUB_OUTPUT"
          echo "::notice::ReleaseGate decision: ${RG_ID} (allowed=${ALLOWED})"

      - name: Enforce declaration
        run: |
          RG_ID="${{ steps.declare.outputs.rg_decision_id }}"
          ALLOWED="${{ steps.declare.outputs.allowed }}"
          if [ -z "${RG_ID}" ]; then
            echo "::error::No decision ID returned — governance declaration failed"
            exit 1
          fi
          if [ "${ALLOWED}" != "true" ]; then
            echo "::error::ReleaseGate blocked deploy (decision: ${RG_ID}). Review: ${RELEASEGATE_URL}/decisions/${RG_ID}"
            exit 1
          fi
          echo "Declaration passed (decision: ${RG_ID})"

      - name: Upload decision artifact
        uses: actions/upload-artifact@v4
        with:
          name: releasegate-decision
          path: releasegate_declare.json

  # ── Jira transition check (optional — only for Jira-driven workflows) ────
  releasegate-jira:
    runs-on: ubuntu-latest
    needs: releasegate-declare
    if: ${{ vars.JIRA_ISSUE_KEY != '' }}
    steps:
      - name: Evaluate Jira transition gate
        id: gate
        env:
          RELEASEGATE_URL:     ${{ secrets.RELEASEGATE_URL }}
          RELEASEGATE_TOKEN:   ${{ secrets.RELEASEGATE_TOKEN }}
          JIRA_ISSUE_KEY:      ${{ vars.JIRA_ISSUE_KEY }}
          JIRA_PROJECT_KEY:    ${{ vars.JIRA_PROJECT_KEY }}
          JIRA_TRANSITION_ID:  ${{ vars.JIRA_TRANSITION_ID || '31' }}
          DEPLOY_ENV:          ${{ vars.DEPLOY_ENV || 'PRODUCTION' }}
        run: |
          RESPONSE=$(curl -sS -X POST "${RELEASEGATE_URL}/integrations/jira/transition/check" \
            -H "Authorization: Bearer ${RELEASEGATE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"issue_key\": \"${JIRA_ISSUE_KEY}\",
              \"transition_id\": \"${JIRA_TRANSITION_ID}\",
              \"source_status\": \"Ready for Release\",
              \"target_status\": \"Done\",
              \"actor_account_id\": \"github-actions\",
              \"environment\": \"${DEPLOY_ENV}\",
              \"project_key\": \"${JIRA_PROJECT_KEY}\",
              \"issue_type\": \"Story\"
            }")
          echo "${RESPONSE}" | tee releasegate_jira.json
          STATUS=$(echo "${RESPONSE}" | jq -r '.status // empty')
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

      - name: Enforce Jira gate
        run: |
          STATUS="${{ steps.gate.outputs.status }}"
          if [ "$STATUS" = "BLOCKED" ] || [ "$STATUS" = "ERROR" ]; then
            echo "::error::ReleaseGate denied Jira transition (status=${STATUS})"
            exit 1
          fi

