name: Reliability Smoke

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  smoke:
    name: Reliability Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Phase 0 core-flow smoke checks
        run: python scripts/phase0_smoke.py
