services:
  - type: web
    name: releasegate-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m releasegate.storage.migrate && uvicorn releasegate.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
